{% extends "base.html" %}
{% block title %}Worker Registration | Service Hub{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <h2>Worker Registration</h2>

        <form method="POST" action="{{ url_for('worker_register') }}">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="input-group">
                <label>Profession</label>
                <select name="profession" required>
                    <option value="">Select Profession</option>
                    <option>Electrician</option>
                    <option>Plumber</option>
                    <option>Carpenter</option>
                    <option>Mechanic</option>
                </select>
            </div>
            <div class="input-group">
                <label>Experience (years)</label>
                <input type="number" name="experience" min="0" max="50" required>
            </div>
            <div class="input-group">
                <label>Location</label>
                <input type="text" name="location" required>
            </div>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="text" name="mobile" required pattern="[0-9]{10}">
            </div>
            <button type="submit" class="btn-primary">Register as Worker</button>
            <p class="auth-link">
                <a href="{{ url_for('login') }}">← Back to Login</a>
            </p>
        </form>
    </div>
</section>
{% endblock %}
